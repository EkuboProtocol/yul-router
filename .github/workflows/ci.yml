name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: yul-router
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install SDK dependencies
        run: bun install --frozen-lockfile
        working-directory: yul-router/sdk

      - name: Build SDK
        run: bun run build
        working-directory: yul-router/sdk

      - name: Test SDK
        run: bun run test
        working-directory: yul-router/sdk

      - name: Build contracts and scripts
        run: forge build
        working-directory: yul-router

      - name: Simulate deploy script
        run: forge script script/DeployYulRouter.s.sol --sig "run()" --offline
        working-directory: yul-router

      - name: Test contracts
        run: forge test
        working-directory: yul-router
