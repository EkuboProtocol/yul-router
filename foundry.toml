[profile.default]
solc = "0.8.33"
evm_version = "osaka"
optimizer = true
optimizer_runs = 9999999
via_ir = true
ffi = true
fs_permissions = [
    { access = "read", path = "out/" }
]
allow_paths = [
    "lib/evm-contracts/src",
    "lib/forge-std/src",
    "lib/solady/src"
]

[fmt]
sort_imports = true
wrap_comments = true

[lint]
lint_on_build = false
